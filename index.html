<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rise Generator</title>

<style>
:root{
  --bg: linear-gradient(135deg,#1e1f4b,#2c2f7a);
  --sidebar: rgba(255,255,255,0.08);
  --accent: #6c63ff;
  --accent-hover: #5a52e0;
  --text: #ffffff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui, -apple-system, sans-serif;
}

body{
  height:100vh;
  background:var(--bg);
  display:flex;
}

/* Sidebar */
.sidebar{
  width:260px;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(20px);
  padding:28px 20px;
  display:flex;
  flex-direction:column;
  gap:12px;
  border-right:1px solid rgba(255,255,255,0.08);
}

.sidebar h2{
  color:white;
  font-size:20px;
  font-weight:700;
  margin-bottom:10px;
}

.sidebar button{
  padding:13px 14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:transparent;
  color:#e6e6e6;
  font-size:14px;
  font-weight:500;
  text-align:left;
  transition:all .25s ease;
}

.sidebar button:hover{
  background:rgba(255,255,255,0.08);
  transform:translateX(4px);
}

.sidebar button.active{
  background:#6c63ff;
  color:white;
}

/* Main Content */
.main{
  flex:1;
  padding:30px;
}

.viewer{
  width:100%;
  height:100%;
  background:white;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 20px 40px rgba(0,0,0,0.4);
}

iframe{
  width:100%;
  height:100%;
  border:none;
  opacity:0;
  transition:opacity 0.4s ease;
}

  .signature{
  margin-top:auto;
  padding-top:20px;
  font-size:13px;
  text-align:center;
  color:#ddd;
  opacity:0.8;
  transition:0.3s;
}

/* Creative signature glow */
.signature span{
  display:inline-block;
  padding:8px 12px;
  border-radius:20px;
  background:var(--neon);
  background-size:200% 200%;
  animation:neonMove 3s linear infinite;
  color:white;
  font-weight:600;
  box-shadow:0 0 15px rgba(108,99,255,0.6);
}

.signature span:hover{
  transform:scale(1.05);
}

iframe.show{
  opacity:1;
}

/* Responsive */
@media(max-width:768px){
  .sidebar{
    width:180px;
  }
}
@keyframes pulseGlow {
  0% { box-shadow: 0 0 0px rgba(108,99,255,0.7); }
  50% { box-shadow: 0 0 20px rgba(108,99,255,1); }
  100% { box-shadow: 0 0 0px rgba(108,99,255,0.7); }
}

.pulse {
  animation: pulseGlow 1s ease-in-out 3;
}
/* PRO Badge */
.pro-badge{
  display:inline-block;
  margin-left:8px;
  padding:4px 10px;
  font-size:11px;
  font-weight:700;
  letter-spacing:0.5px;
  border-radius:20px;
  background:linear-gradient(90deg,#ff8a00,#ff00cc);
  color:white;
  box-shadow:0 0 12px rgba(255,0,200,0.6);
  vertical-align:middle;
}
.auth-modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none; /* important */
justify-content:center;
align-items:center;
z-index:999;
}

.auth-box{
 position:relative;
background:white;
padding:35px;
border-radius:16px;
width:320px;
display:flex;
flex-direction:column;
gap:14px;
}

.auth-box h2{
  text-align:center;
  margin-bottom:10px;
}

.auth-box input{
padding:12px;
  border-radius:8px;
  border:1px solid #ddd;
  font-size:14px;
}

.auth-box input:focus{
  outline:none;
  border-color:#6c63ff;
}

.auth-box button{
padding:12px;
  border:none;
  border-radius:8px;
  background:#6c63ff;
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
}

.auth-box button:hover{
  background:#5a52e0;
}
.viewer{
  width:100%;
  height:100%;
  background:white;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}
.auth-box p{
text-align:center;
cursor:pointer;
color:#6c63ff;
}
.user-profile{
display:flex;
align-items:center;
gap:10px;
margin-bottom:20px;
padding:10px;
border-radius:10px;
background:rgba(255,255,255,0.08);
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
background:linear-gradient(135deg,#6c63ff,#9b5cff);
display:flex;
align-items:center;
justify-content:center;
font-weight:700;
color:white;
font-size:18px;
box-shadow:0 0 10px rgba(108,99,255,0.6);
}

.user-text{
display:flex;
flex-direction:column;
}

.welcome{
font-size:11px;
color:#bbb;
}

#userName{
font-size:14px;
font-weight:600;
color:white;
}
.profile-card{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px;
  margin-bottom:15px;
  border-radius:12px;
  background:rgba(255,255,255,0.05);
}

.avatar{
  width:42px;
  height:42px;
  border-radius:50%;
  background:linear-gradient(135deg,#6c63ff,#9b5cff);
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-weight:700;
  font-size:18px;
}

.profile-name{
  color:white;
  font-size:14px;
  font-weight:600;
}

.profile-status{
  font-size:11px;
  color:#bbb;
}

.close-auth{
position:absolute;
top:12px;
right:15px;
background:none;
border:none;
font-size:18px;
cursor:pointer;
color:#777;
}

.close-auth:hover{
color:black;
}
.lock-icon{
margin-right:8px;
font-size:14px;
opacity:0.9;
}
</style>
</head>

<body>
  <div id="authModal" class="auth-modal">

<div class="auth-box">
  <button class="close-auth" onclick="closeAuth()">✕</button>

<h2 id="authTitle">Login</h2>

<input id="name" placeholder="Name" style="display:none">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="submitAuth()">Submit</button>

<p id="switchAuth" onclick="toggleAuth()">Create account</p>

</div>
</div>
<div class="sidebar">
  <h2>Rise Interactivity<!--<span class="pro-badge">PRO</span>--></h2>
  <div class="profile-card">
  <div class="avatar" id="avatar">T</div>
  <div class="profile-text">
    <div class="profile-name" id="userName">Guest</div>
    <div class="profile-status">Free plan</div>
  </div>
</div>

  
<button data-page="Accordion" onclick="secureLoad('pages/Accordion_Customize.html', this)">
<span class="lock-icon">🔒</span> Accordion
</button>

<button data-page="Tab" onclick="secureLoad('pages/Tab_Customize.html', this)">
<span class="lock-icon">🔒</span> Tab
</button>

<button data-page="Flip" onclick="secureLoad('pages/maintance.html', this)">
<span class="lock-icon">🔒</span> Flip
</button>

<button data-page="Text-Entry" onclick="secureLoad('pages/maintance.html', this)">
<span class="lock-icon">🔒</span> Text Entry
</button>

<button data-page="Certificate" onclick="secureLoad('pages/certificate-final.html', this)">
<span class="lock-icon">🔒</span> Certificate
</button>
<button data-page="Admin" onclick="secureLoad('pages/admin.html', this)">
<span>Admin Dashboard</span>
</button>
<button id="authBtn" onclick="authAction()">Login</button>
   <div class="signature" onclick="celebrate()">
    <span>Developed by Thinesh ❤️</span>
  </div>
</div>

<div class="main">
  <div class="viewer">
    <iframe id="frame"></iframe>
  </div>
</div>

<script>
  const ADMIN_EMAIL = "admin@rise.com";
const ADMIN_PASSWORD = "admin123";
  function updateLockIcons(){

  const user = sessionStorage.getItem("user");
  const icons = document.querySelectorAll(".lock-icon");

  icons.forEach(icon => {

    if(user){
      icon.textContent = "🔓";
    }else{
      icon.textContent = "🔒";
    }

  });

}
  function closeAuth(){

  resetLoginForm();
  document.getElementById("authModal").style.display = "none";

}
function authAction(){

  const user = sessionStorage.getItem("user");

  if(user){

    logoutUser();

  }else{

    resetLoginForm();   // reset fields
    document.getElementById("authModal").style.display = "flex";
    setTimeout(()=>{
document.getElementById("email").focus();
},200);
  }

}
function resetLoginForm(){

  document.getElementById("name").value = "";
  document.getElementById("email").value = "";
  document.getElementById("password").value = "";

  // Reset to login mode
  mode = "login";
  document.getElementById("authTitle").innerText = "Login";
  document.getElementById("name").style.display = "none";
  document.getElementById("switchAuth").innerText = "Create account";

}
function showUser(){

const name = sessionStorage.getItem("name");
const role = sessionStorage.getItem("role");

document.getElementById("userName").innerText = name;

const firstLetter = name.charAt(0).toUpperCase();
document.getElementById("avatar").innerText = firstLetter;

if(role === "admin"){

document.querySelector(".profile-status").innerText = "Administrator";

}else{

document.querySelector(".profile-status").innerText = "User";

}

}
  function logoutUser(){

  sessionStorage.removeItem("user");
  sessionStorage.removeItem("name");
  sessionStorage.removeItem("role");

  document.getElementById("userName").innerText = "Guest";
  document.getElementById("avatar").innerText = "U";

  document.getElementById("authBtn").innerText = "Login";

  updateLockIcons();

  loadPage('pages/Welcome.html');

}
function secureLoad(page, btn){

const user = sessionStorage.getItem("user");
const role = sessionStorage.getItem("role");

if(!user){

document.getElementById("authModal").style.display="flex";
return;

}

/* ADMIN DASHBOARD PROTECTION */

if(page.includes("admin.html") && role !== "admin"){

alert("Admin access only");
return;

}

loadPage(page, btn);

}
  function toggleAuth(){

  if(mode === "login"){

    mode = "signup";
    document.getElementById("authTitle").innerText = "Create Account";
    document.getElementById("name").style.display = "block";
    document.getElementById("switchAuth").innerText = "Already have account? Login";

  }else{

    mode = "login";
    document.getElementById("authTitle").innerText = "Login";
    document.getElementById("name").style.display = "none";
    document.getElementById("switchAuth").innerText = "Create account";

  }

}
function loadPage(page, btn){
  const iframe = document.getElementById("frame");

  // Remove active class from all buttons
  document.querySelectorAll(".sidebar button")
    .forEach(b => b.classList.remove("active"));

  // Add active only if a button triggered it
  if(btn){
    btn.classList.add("active");
  }

  iframe.classList.remove("show");

  setTimeout(() => {
    iframe.src = page;
    iframe.onload = () => {
      iframe.classList.add("show");
    }
  }, 200);
}

// Load welcome page automatically WITHOUT activating any button
window.onload = function(){

  const user = sessionStorage.getItem("user");

  if(user){

    document.getElementById("authBtn").innerText = "Logout";
    showUser();

  }else{

    document.getElementById("authBtn").innerText = "Login";

  }

  updateLockIcons();
  loadPage('pages/Welcome.html');

};

</script>
<script>
function celebrate(){



  // 😊 RANDOM FLOATING EMOJIS
  const emojis = ["😊","😎","🔥","🚀","✨","🎉","😁","🌟"];

  for(let i = 0; i < 6; i++){

    const emoji = document.createElement("div");
    emoji.className = "emoji";
    emoji.textContent = emojis[Math.floor(Math.random() * emojis.length)];

    emoji.style.left = Math.random() * window.innerWidth + "px";
    emoji.style.top = window.innerHeight + "px";

    emoji.style.position = "fixed";
    emoji.style.fontSize = (20 + Math.random()*20) + "px";
    emoji.style.pointerEvents = "none";
    emoji.style.transition = "all 2s ease-out";

    document.body.appendChild(emoji);

    setTimeout(() => {
      emoji.style.top = (window.innerHeight - 200 - Math.random()*200) + "px";
      emoji.style.opacity = "0";
    }, 50);

    setTimeout(() => {
      emoji.remove();
    }, 2000);
  }
}
</script>
<script>
window.addEventListener("message", function(event){

  if(!event.data || !event.data.type) return;

  if(event.data.type === "highlight"){
    const pageName = event.data.page;
    const buttons = document.querySelectorAll(".sidebar button");

    buttons.forEach(btn=>{
      btn.classList.remove("pulse");

      if(btn.dataset.page === pageName){
        btn.classList.add("pulse");
      }
    });
  }

});
</script>
<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxRc7KbDRDKG8TiaNut5pAE8HCe5bhrpm145VNCQUpRHy_C8aMEowe3QxF2XG0i2AudQQ/exec";
let mode = "login";
function submitAuth(){

const name = document.getElementById("name").value;
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

/* ADMIN LOGIN */

if(email === ADMIN_EMAIL && password === ADMIN_PASSWORD){

sessionStorage.setItem("user", email);
sessionStorage.setItem("name", "Admin");
sessionStorage.setItem("role", "admin");

document.getElementById("authModal").style.display="none";
document.getElementById("authBtn").innerText = "Logout";

showUser();
updateLockIcons();

return;

}

/* NORMAL USER LOGIN */

const url =
API_URL +
"?action=login" +
"&email=" + encodeURIComponent(email) +
"&password=" + encodeURIComponent(password);

fetch(url)
.then(res => res.json())
.then(data => {

if(data.status === "success"){

sessionStorage.setItem("user", email);
sessionStorage.setItem("name", data.name);
sessionStorage.setItem("role", "user");

document.getElementById("authModal").style.display="none";
document.getElementById("authBtn").innerText = "Logout";
showUser();
updateLockIcons();

}else{

alert("Invalid login");

}

});

}
</script>
</body>

</html>
