<!DOCTYPE html>
<html>
<head>

<title>Admin Dashboard</title>

<style>

body{
font-family:Arial;
padding:40px;
}

h2{
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border:1px solid #ccc;
}

th{
background:#6c63ff;
color:white;
}

</style>

</head>

<body>

<h2>Registered Users</h2>

<table id="userTable">

<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Signup Date</th>
</tr>
</thead>

<tbody id="userBody"></tbody>

</table>

<script>

const API_URL = "PASTE_YOUR_SCRIPT_URL";

fetch(API_URL + "?action=getUsers")
.then(response => response.json())
.then(users => {

const tableBody = document.getElementById("userBody");

users.forEach(user => {

const row = document.createElement("tr");

row.innerHTML = `
<td>${user.name}</td>
<td>${user.email}</td>
<td>${user.date}</td>
`;

tableBody.appendChild(row);

});

})
.catch(err=>{
console.error("Error loading users:", err);
});

</script>

</body>
</html>
